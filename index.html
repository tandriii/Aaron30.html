<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Reasons I Love You</title>

<style>
:root{
  --bg:#0f2027;
  --bg2:#203a43;
  --bg3:#2c5364;
  --text:#ffffff;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  color:var(--text);
  background: linear-gradient(135deg,var(--bg),var(--bg2),var(--bg3));
  overflow-x:hidden;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px;
}

.text{
  max-width:50%;
}

h1{
  font-size:60px;
  margin:0;
}

.subtitle{
  opacity:0.8;
  margin-top:20px;
}

/* IMAGES */
.images{
  display:flex;
  gap:20px;
}

.images img{
  width:200px;
  height:260px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition:0.3s;
}

.images img:hover{
  transform:scale(1.05);
}

/* FLOATING HEARTS */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:14px;
  animation:float 8s linear infinite;
  opacity:0.7;
}

@keyframes float{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-100vh) scale(1.5);}
}

/* SECTIONS */
.section{
  padding:40px 60px;
}

h2{
  margin-bottom:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{
    flex-direction:column;
    text-align:center;
  }
  .text{
    max-width:100%;
  }
  .images{
    margin-top:20px;
  }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<!-- 💖 HERO -->
<div class="hero">
  <div class="text">
    <h1>30 reasons.<br>One person.</h1>
    <p class="subtitle">
      The boy I met in Geneva, the man I found again, and the one I choose every day.
    </p>
  </div>

  <div class="images">
    <!-- REPLACE THESE FILE NAMES WITH YOUR EXACT ONES -->
    <img src="sunset.jpg">
    <img src="pokemon.jpg">
  </div>
</div>

<!-- 💌 CONTENT -->
<div class="section">
  <h2>Our story</h2>
  <p>We met young. Life brought us back. And somehow, we never let go.</p>
</div>

<div class="section">
  <h2>30 reasons I love you</h2>
  <p>Because you are my peace, my laughter, my safe place, and my best friend.</p>
</div>

<!-- 💖 FLOATING HEARTS SCRIPT -->
<script>
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💚 A+V";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (5 + Math.random()*5) + "s";

  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove()},8000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
